<style>
  /* ── notes page header ── */
  .notes-hero{padding:64px 0 32px;display:grid;grid-template-columns:1.4fr .9fr;gap:48px;align-items:end}
  .notes-hero .lhs .eyebrow{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);display:flex;align-items:center;gap:14px;margin-bottom:24px}
  .notes-hero .lhs .eyebrow .bar{flex:0 0 48px;height:1px;background:var(--ink-3)}
  .notes-hero h1{font-family:"Instrument Serif",serif;font-weight:400;font-size:clamp(48px,7vw,108px);line-height:.95;letter-spacing:-0.025em;margin:0;color:var(--ink);padding-bottom:.16em}
  .notes-hero h1 em{font-style:italic;color:var(--accent)}
  .notes-hero .rhs{font-family:"Instrument Serif",serif;font-size:19px;line-height:1.4;color:var(--ink-2);max-width:38ch;padding-bottom:12px}
  @media (max-width:900px){
    .notes-hero{grid-template-columns:1fr;gap:24px;padding:36px 0 24px;align-items:start}
    .notes-hero h1{font-size:clamp(42px,11vw,72px)}
    .notes-hero .rhs{font-size:17px;padding:0}
  }

  /* ── notes list ── */
  .notes-list{display:flex;flex-direction:column;margin-top:8px}
  .nrow{
    display:grid;grid-template-columns:64px 1.7fr 1fr .7fr 28px;
    align-items:center;gap:24px;padding:24px 4px;
    border-bottom:.5px solid var(--rule);
    transition:background .3s ease, padding-left .3s ease;
    cursor:default;color:inherit;
  }
  .nrow:hover{background:var(--paper-2);padding-left:14px}
  .nrow .idx{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--ink-3);letter-spacing:.05em}
  .nrow h3{font-family:"Instrument Serif",serif;font-weight:400;font-size:26px;line-height:1.1;letter-spacing:-.015em;margin:0;color:var(--ink)}
  .nrow h3 em{font-style:italic;color:var(--accent);transition:color .3s ease}
  .nrow .dek{font-family:"Instrument Serif",serif;font-style:italic;font-size:15px;line-height:1.4;color:var(--ink-2);margin:6px 0 0;max-width:42ch}
  .nrow .meta{font-family:"JetBrains Mono",monospace;font-size:10.5px;color:var(--ink-3);letter-spacing:.08em;text-transform:uppercase;display:flex;flex-direction:column;gap:6px;align-items:flex-start}
  .nrow .meta .tag{color:var(--ink-2)}
  .nrow .date{font-family:"Instrument Sans",sans-serif;font-size:13px;color:var(--ink-3);font-variant-numeric:tabular-nums}
  .nrow .arrow{width:28px;height:28px;border:.5px solid var(--rule);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--ink-3);transition:all .3s cubic-bezier(.2,.7,.2,1)}
  .nrow:hover .arrow{background:var(--ink);color:var(--paper);border-color:var(--ink);transform:rotate(45deg)}

  /* Optional thumbnail when a note has a cover image */
  .nrow-body{display:flex;gap:20px;align-items:flex-start}
  .nrow-thumb{
    flex:0 0 120px;width:120px;height:84px;border-radius:4px;overflow:hidden;
    border:.5px solid var(--rule);background:var(--paper-2);
    transition:transform .35s ease;
  }
  .nrow-thumb img{width:100%;height:100%;object-fit:cover;display:block;filter:saturate(.92)}
  .nrow:hover .nrow-thumb{transform:scale(.985)}
  .nrow-text{flex:1;min-width:0}

  /* mobile: collapse the 5-col grid to a stacked card */
  @media (max-width:900px){
    .nrow{
      grid-template-columns:auto 1fr auto;
      grid-template-areas:
        "idx tag arrow"
        "title title title"
        "dek dek dek"
        "date date date";
      row-gap:10px;padding:22px 4px;
    }
    .nrow:hover{padding-left:4px}
    .nrow .idx{grid-area:idx}
    .nrow .meta{grid-area:tag;flex-direction:row}
    .nrow .meta .min{display:none}
    .nrow .arrow{grid-area:arrow}
    .nrow .nrow-body{grid-area:title}
    .nrow .nrow-body{flex-direction:row;gap:14px}
    .nrow .nrow-thumb{flex:0 0 88px;width:88px;height:64px}
    .nrow h3{font-size:21px}
    .nrow .dek{margin:0;font-size:14.5px}
    .nrow .date{grid-area:date;font-size:12px}
  }
  @media (max-width:560px){
    .nrow .nrow-body{flex-direction:column}
    .nrow .nrow-thumb{width:100%;height:140px;flex-basis:auto}
  }

  /* ── archive sidebar ── */
  .archive{display:grid;grid-template-columns:1fr 240px;gap:48px;align-items:start}
  .archive .side{position:sticky;top:24px;padding:24px 0 0;font-family:"Instrument Sans",sans-serif;font-size:13px;color:var(--ink-2)}
  .archive .side h4{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin:0 0 14px;font-weight:500}
  .archive .side .yr{display:flex;justify-content:space-between;padding:8px 0;border-bottom:.5px dashed var(--rule-soft);color:var(--ink-2);font-variant-numeric:tabular-nums}
  .archive .side .yr b{font-weight:500;color:var(--ink)}
  .archive .side .quote{margin-top:36px;padding-top:24px;border-top:.5px solid var(--rule);font-family:"Instrument Serif",serif;font-style:italic;font-size:17px;line-height:1.4;color:var(--ink-2)}
  .archive .side .quote span{display:block;margin-top:10px;font-style:normal;font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3)}
  @media (max-width:900px){
    .archive{grid-template-columns:1fr;gap:24px}
    .archive .side{position:static;order:-1;display:grid;grid-template-columns:1fr 1fr;gap:18px 32px;padding-top:0}
    .archive .side .quote{grid-column:1 / -1;margin-top:8px;padding-top:18px}
  }
</style>
</head>
